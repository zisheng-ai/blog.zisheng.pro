<svg xmlns="http://www.w3.org/2000/svg" width="1600" height="900" viewBox="0 0 1600 900" role="img" aria-labelledby="title desc">
  <title id="title">客服 Hybrid RAG 检索流程</title><desc id="desc">客服口语问题经过查询改写，并行使用 BM25、向量检索和元数据过滤，再经融合与重排得到可引用证据。</desc>
  <defs><linearGradient id="bg" x1="0" y1="0" x2="1" y2="1"><stop stop-color="#06101a"/><stop offset="1" stop-color="#10172a"/></linearGradient><pattern id="g" width="40" height="40" patternUnits="userSpaceOnUse"><path d="M40 0H0V40" fill="none" stroke="#78b6d8" stroke-opacity=".06"/></pattern><marker id="a" viewBox="0 0 10 10" refX="8" refY="5" markerWidth="7" markerHeight="7" orient="auto"><path d="M0 0l10 5-10 5z" fill="#7288aa"/></marker></defs><rect width="1600" height="900" fill="url(#bg)"/><rect width="1600" height="900" fill="url(#g)"/>
  <g font-family="-apple-system,BlinkMacSystemFont,'PingFang SC','Microsoft YaHei',sans-serif"><text x="80" y="86" fill="#f7f9ff" font-size="48" font-weight="800">向量不是单通道：客服检索要做 Hybrid</text><text x="80" y="132" fill="#9cacC7" font-size="22">语义负责找“说法相近”，关键词负责守住编码与术语，Metadata 负责先排除不可用内容</text>
    <rect x="90" y="345" width="280" height="125" rx="25" fill="#10243a" stroke="#45cef3"/><text x="230" y="392" fill="#fff" font-size="24" font-weight="750" text-anchor="middle">客服口语问题</text><text x="230" y="429" fill="#a9c6d8" font-size="18" text-anchor="middle">“原路退，几天能到？”</text>
    <rect x="455" y="345" width="270" height="125" rx="25" fill="#14243b" stroke="#5bbbea"/><text x="590" y="392" fill="#fff" font-size="24" font-weight="750" text-anchor="middle">Query Rewrite</text><text x="590" y="429" fill="#aac5da" font-size="18" text-anchor="middle">退款方式 · 到账时效</text>
    <g text-anchor="middle"><rect x="835" y="190" width="285" height="110" rx="23" fill="#14243b" stroke="#44c9ef"/><text x="977" y="236" fill="#68dcff" font-size="23" font-weight="740">BM25</text><text x="977" y="270" fill="#c7ddea" font-size="18">精确术语与编号</text><rect x="835" y="350" width="285" height="110" rx="23" fill="#181b38" stroke="#7e8cff"/><text x="977" y="396" fill="#aeb6ff" font-size="23" font-weight="740">Vector Search</text><text x="977" y="430" fill="#d6daf8" font-size="18">同义表达与语义</text><rect x="835" y="510" width="285" height="110" rx="23" fill="#182820" stroke="#65d49d"/><text x="977" y="556" fill="#80e8b5" font-size="23" font-weight="740">Metadata Filter</text><text x="977" y="590" fill="#d8f2e5" font-size="18">权限 · 版本 · 时效</text></g>
    <rect x="1220" y="265" width="270" height="125" rx="25" fill="#1d1832" stroke="#a77aee"/><text x="1355" y="312" fill="#fff" font-size="24" font-weight="750" text-anchor="middle">Rank Fusion</text><text x="1355" y="349" fill="#d5c6e7" font-size="18" text-anchor="middle">合并多个排名</text><rect x="1220" y="470" width="270" height="125" rx="25" fill="#271b11" stroke="#eea561"/><text x="1355" y="517" fill="#fff" font-size="24" font-weight="750" text-anchor="middle">Reranker</text><text x="1355" y="554" fill="#e8d3c1" font-size="18" text-anchor="middle">判断能否回答当前问题</text>
    <path d="M370 407h77M725 407h100M725 407v-162h100M725 407v158h100M1120 245h90v82M1120 405h90v-78M1120 565h90v-32M1355 390v72" fill="none" stroke="#7288aa" stroke-width="3" marker-end="url(#a)"/>
    <rect x="455" y="710" width="1035" height="100" rx="25" fill="#10243a" stroke="#45cef3"/><text x="972" y="752" fill="#f2f7ff" font-size="26" font-weight="750" text-anchor="middle">Evidence Top K</text><text x="972" y="787" fill="#b3cbda" font-size="19" text-anchor="middle">正文片段 + Source URI + Revision + Span；相似度分数本身不是证据</text><path d="M1355 595v105" stroke="#7288aa" stroke-width="3" marker-end="url(#a)"/>
    <text x="800" y="858" fill="#70829e" font-size="18" text-anchor="middle">第一轮没召回的资料，Reranker 无法凭空找回；评测要把 Recall 与排序质量分开看</text>
  </g>
</svg>
