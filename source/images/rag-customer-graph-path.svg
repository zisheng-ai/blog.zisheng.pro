<svg xmlns="http://www.w3.org/2000/svg" width="1600" height="920" viewBox="0 0 1600 920" role="img" aria-labelledby="title desc"><title id="title">客服 GraphRAG 多跳路径</title><desc id="desc">取消订单沿使用权益券、受政策约束、满足例外条件的关系路径定位原因，并回到原文证据。</desc><defs><linearGradient id="bg" x1="0" y1="0" x2="1" y2="1"><stop stop-color="#0a0915"/><stop offset="1" stop-color="#171027"/></linearGradient><pattern id="g" width="40" height="40" patternUnits="userSpaceOnUse"><path d="M40 0H0V40" fill="none" stroke="#b89bdd" stroke-opacity=".06"/></pattern><marker id="a" viewBox="0 0 10 10" refX="8" refY="5" markerWidth="7" markerHeight="7" orient="auto"><path d="M0 0l10 5-10 5z" fill="#a37bca"/></marker></defs><rect width="1600" height="920" fill="url(#bg)"/><rect width="1600" height="920" fill="url(#g)"/>
<g font-family="-apple-system,BlinkMacSystemFont,'PingFang SC','Microsoft YaHei',sans-serif"><text x="80" y="86" fill="#f8f6ff" font-size="48" font-weight="800">GraphRAG 的价值：把“为什么”落成一条可检查路径</text><text x="80" y="132" fill="#aa9fbe" font-size="22">图负责限定关系范围，原始 Text Span 负责证明每一跳；两者缺一不可</text>
