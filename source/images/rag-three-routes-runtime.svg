<svg xmlns="http://www.w3.org/2000/svg" width="1600" height="920" viewBox="0 0 1600 920" role="img" aria-labelledby="title desc">
  <title id="title">三条 RAG 路线的构建时与查询时成本</title>
  <desc id="desc">向量 RAG 在查询时检索片段，GraphRAG 在构建时抽取关系、查询时遍历，编译式 RAG 在构建时生成知识产物、查询时读取并验证。</desc>
  <defs>
    <linearGradient id="bg2" x1="0" y1="0" x2="1" y2="1"><stop stop-color="#080b15"/><stop offset="1" stop-color="#11162a"/></linearGradient>
    <pattern id="grid2" width="36" height="36" patternUnits="userSpaceOnUse"><path d="M36 0H0V36" fill="none" stroke="#7890c9" stroke-opacity=".06"/></pattern>
    <marker id="arrow" viewBox="0 0 10 10" refX="8" refY="5" markerWidth="7" markerHeight="7" orient="auto-start-reverse"><path d="M0 0l10 5-10 5z" fill="#7587ac"/></marker>
  </defs>
  <rect width="1600" height="920" fill="url(#bg2)"/><rect width="1600" height="920" fill="url(#grid2)"/>
  <text x="80" y="86" fill="#f6f8ff" font-family="-apple-system,BlinkMacSystemFont,'PingFang SC','Microsoft YaHei',sans-serif" font-size="46" font-weight="800">成本没有消失，只是被放在不同阶段</text>
  <text x="80" y="132" fill="#9ba8c4" font-family="-apple-system,BlinkMacSystemFont,'PingFang SC','Microsoft YaHei',sans-serif" font-size="22">同一批 Source，在 Build Time 被加工成不同中间表示；Query Time 决定延迟、召回与推理方式</text>
  <text x="375" y="198" fill="#71809f" font-family="-apple-system,BlinkMacSystemFont,'PingFang SC','Microsoft YaHei',sans-serif" font-size="20" font-weight="700" text-anchor="middle">BUILD TIME</text>
  <text x="1160" y="198" fill="#71809f" font-family="-apple-system,BlinkMacSystemFont,'PingFang SC','Microsoft YaHei',sans-serif" font-size="20" font-weight="700" text-anchor="middle">QUERY TIME</text>
  <line x1="800" y1="174" x2="800" y2="850" stroke="#566683" stroke-dasharray="9 10"/>

  <g font-family="-apple-system,BlinkMacSystemFont,'PingFang SC','Microsoft YaHei',sans-serif">
    <rect x="70" y="235" width="1460" height="170" rx="24" fill="#0d1728" stroke="#2caee4" stroke-opacity=".55"/>
    <text x="105" y="285" fill="#56d9ff" font-size="28" font-weight="760">向量 RAG</text>
    <g fill="#15233a" stroke="#3fbde9"><rect x="300" y="270" width="150" height="72" rx="14"/><rect x="525" y="270" width="150" height="72" rx="14"/><rect x="950" y="270" width="150" height="72" rx="14"/><rect x="1180" y="270" width="230" height="72" rx="14"/></g>
    <g fill="#d9eff9" font-size="19" text-anchor="middle"><text x="375" y="314">Chunk</text><text x="600" y="314">Embedding</text><text x="1025" y="314">Top K + Rerank</text><text x="1295" y="314">Evidence Context</text></g>
    <g stroke="#7587ac" stroke-width="3" marker-end="url(#arrow)"><path d="M450 306h67"/><path d="M675 306h267"/><path d="M1100 306h72"/></g>
    <text x="375" y="378" fill="#7f92b4" font-size="17" text-anchor="middle">构建便宜，更新简单</text><text x="1178" y="378" fill="#7f92b4" font-size="17" text-anchor="middle">每次问题重新召回、拼接、推理</text>

    <rect x="70" y="435" width="1460" height="170" rx="24" fill="#171126" stroke="#a95fe6" stroke-opacity=".6"/>
    <text x="105" y="485" fill="#d18cff" font-size="28" font-weight="760">GraphRAG</text>
    <g fill="#25183a" stroke="#b46dec"><rect x="270" y="470" width="180" height="72" rx="14"/><rect x="520" y="470" width="180" height="72" rx="14"/><rect x="925" y="470" width="210" height="72" rx="14"/><rect x="1205" y="470" width="210" height="72" rx="14"/></g>
    <g fill="#eee1f7" font-size="19" text-anchor="middle"><text x="360" y="514">实体 / 关系抽取</text><text x="610" y="514">社区 / 摘要</text><text x="1030" y="514">定位实体 + 遍历</text><text x="1310" y="514">图 + 原文证据</text></g>
    <g stroke="#7587ac" stroke-width="3" marker-end="url(#arrow)"><path d="M450 506h62"/><path d="M700 506h217"/><path d="M1135 506h62"/></g>
    <text x="395" y="578" fill="#947fab" font-size="17" text-anchor="middle">构建贵，实体消歧与增量更新难</text><text x="1178" y="578" fill="#947fab" font-size="17" text-anchor="middle">多跳关系更直接，全局查询仍可能昂贵</text>

    <rect x="70" y="635" width="1460" height="170" rx="24" fill="#22170f" stroke="#ed9b54" stroke-opacity=".65"/>
    <text x="105" y="685" fill="#ffc178" font-size="28" font-weight="760">编译式 RAG</text>
    <g fill="#382315" stroke="#f2a65f"><rect x="270" y="670" width="180" height="72" rx="14"/><rect x="520" y="670" width="180" height="72" rx="14"/><rect x="925" y="670" width="210" height="72" rx="14"/><rect x="1205" y="670" width="210" height="72" rx="14"/></g>
    <g fill="#f7e6d5" font-size="19" text-anchor="middle"><text x="360" y="714">抽取 / 合并 / 冲突</text><text x="610" y="714">页面 / 流程 / 索引</text><text x="1030" y="714">Search / Read / Follow</text><text x="1310" y="714">已组织知识 + 原证据</text></g>
    <g stroke="#7587ac" stroke-width="3" marker-end="url(#arrow)"><path d="M450 706h62"/><path d="M700 706h217"/><path d="M1135 706h62"/></g>
    <text x="395" y="778" fill="#a9896f" font-size="17" text-anchor="middle">把重复综合前移，但必须评测信息损失</text><text x="1178" y="778" fill="#a9896f" font-size="17" text-anchor="middle">查询更像读已维护代码，而不是临时拼碎片</text>
  </g>
  <text x="800" y="872" fill="#6f7f9f" font-family="-apple-system,BlinkMacSystemFont,'PingFang SC','Microsoft YaHei',sans-serif" font-size="18" text-anchor="middle">三条路线都必须保留 Source、Revision、Citation 与重建能力</text>
</svg>
