<svg xmlns="http://www.w3.org/2000/svg" width="1600" height="920" viewBox="0 0 1600 920" role="img" aria-labelledby="title desc">
  <title id="title">客服问题按问题形状路由</title><desc id="desc">事实查找走 Hybrid RAG，关系解释走 GraphRAG，稳定流程走编译式 RAG，三条路线统一返回证据。</desc>
  <defs><linearGradient id="bg" x1="0" y1="0" x2="1" y2="1"><stop stop-color="#070b15"/><stop offset="1" stop-color="#130d22"/></linearGradient><pattern id="grid" width="40" height="40" patternUnits="userSpaceOnUse"><path d="M40 0H0V40" fill="none" stroke="#899bc9" stroke-opacity=".06"/></pattern><marker id="a" viewBox="0 0 10 10" refX="8" refY="5" markerWidth="7" markerHeight="7" orient="auto"><path d="M0 0l10 5-10 5z" fill="#7c8aaa"/></marker></defs>
  <rect width="1600" height="920" fill="url(#bg)"/><rect width="1600" height="920" fill="url(#grid)"/>
  <g font-family="-apple-system,BlinkMacSystemFont,'PingFang SC','Microsoft YaHei',sans-serif"><text x="80" y="86" fill="#f7f9ff" font-size="48" font-weight="800">同一个客服入口，三种不同的问题形状</text><text x="80" y="132" fill="#9ba8c6" font-size="22">路由依据不是“哪项技术更新”，而是答案需要一个片段、一条路径，还是一套稳定流程</text>
    <rect x="600" y="180" width="400" height="105" rx="26" fill="#111a2d" stroke="#7387b5"/><text x="800" y="224" fill="#f3f5ff" font-size="27" font-weight="750" text-anchor="middle">客服问题路由器</text><text x="800" y="258" fill="#aab7d3" font-size="18" text-anchor="middle">Intent · Scope · Risk · Freshness</text>
    <g><rect x="70" y="385" width="430" height="235" rx="28" fill="#0e1d2d" stroke="#43c9ef"/><text x="105" y="432" fill="#65dcff" font-size="20" font-weight="700">Q1 · FACT LOOKUP</text><text x="105" y="480" fill="#fff" font-size="30" font-weight="760">退款多久能到账？</text><text x="105" y="530" fill="#bed3e5" font-size="20">需要：一个有效政策片段</text><rect x="105" y="559" width="258" height="40" rx="20" fill="#163c50"/><text x="234" y="586" fill="#83e4ff" font-size="18" text-anchor="middle">Hybrid RAG</text>
      <rect x="585" y="385" width="430" height="235" rx="28" fill="#1a1430" stroke="#b875ee"/><text x="620" y="432" fill="#d49aff" font-size="20" font-weight="700">Q2 · RELATION</text><text x="620" y="480" fill="#fff" font-size="30" font-weight="760">权益为什么没有退回？</text><text x="620" y="530" fill="#d2c2e3" font-size="20">需要：订单 → 权益 → 政策路径</text><rect x="620" y="559" width="258" height="40" rx="20" fill="#392252"/><text x="749" y="586" fill="#dea8ff" font-size="18" text-anchor="middle">GraphRAG</text>
      <rect x="1100" y="385" width="430" height="235" rx="28" fill="#25180f" stroke="#efa45f"/><text x="1135" y="432" fill="#ffc482" font-size="20" font-weight="700">Q3 · PROCEDURE</text><text x="1135" y="480" fill="#fff" font-size="30" font-weight="760">支付与订单状态不一致</text><text x="1135" y="530" fill="#e2cdb9" font-size="20">需要：稳定核验、回复与升级流程</text><rect x="1135" y="559" width="258" height="40" rx="20" fill="#54351e"/><text x="1264" y="586" fill="#ffd095" font-size="18" text-anchor="middle">编译式 RAG</text></g>
    <path d="M800 285v50H285v42M800 335v42M800 335h515v42" fill="none" stroke="#7c8aaa" stroke-width="3" marker-end="url(#a)"/>
    <path d="M285 620v70h515M800 620v70M1315 620v70H800M800 690v38" fill="none" stroke="#7c8aaa" stroke-width="3" marker-end="url(#a)"/>
    <rect x="330" y="735" width="940" height="100" rx="26" fill="#121b2e" stroke="#7288b7"/><text x="800" y="778" text-anchor="middle" fill="#f2f5ff" font-size="27" font-weight="750">统一 Evidence Contract</text><text x="800" y="813" text-anchor="middle" fill="#acb9d4" font-size="19">答案可以来自不同知识表示，但 Citation、Revision、Permission 和 Trace 必须一致</text>
  </g>
</svg>
