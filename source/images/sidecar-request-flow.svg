<svg xmlns="http://www.w3.org/2000/svg" width="1600" height="980" viewBox="0 0 1600 980" role="img" aria-labelledby="title desc"><title id="title">Sidecar 请求与事件流</title><desc id="desc">用户任务从 Webview 经 Rust Core 校验后发给 Node Sidecar，工具执行事件经 Core 审计后返回 UI。</desc><rect width="1600" height="980" fill="#f6f8fb"/><text x="90" y="90" font-family="system-ui,sans-serif" font-size="42" font-weight="700" fill="#172033">一次 Agent 请求怎样穿过边界</text>
<g font-family="system-ui,sans-serif"><g fill="#ffffff" stroke="#a9b6c8" stroke-width="3"><rect x="90" y="150" width="250" height="80" rx="18"/><rect x="470" y="150" width="300" height="80" rx="18"/><rect x="900" y="150" width="280" height="80" rx="18"/><rect x="1310" y="150" width="200" height="80" rx="18"/></g><g font-size="24" font-weight="700" fill="#172033" text-anchor="middle"><text x="215" y="200">Webview</text><text x="620" y="200">Rust Core</text><text x="1040" y="200">Node Sidecar</text><text x="1410" y="200">Workspace</text></g><g stroke="#b4becb" stroke-width="3" stroke-dasharray="8 8"><path d="M215 230V900"/><path d="M620 230V900"/><path d="M1040 230V900"/><path d="M1410 230V900"/></g>
<g stroke-width="4" fill="none"><path d="M215 300H620" stroke="#315b7d"/><path d="M620 430H1040" stroke="#a06b18"/><path d="M1040 550H1410" stroke="#a06b18"/><path d="M1410 650H1040" stroke="#486d55"/><path d="M1040 740H620" stroke="#486d55"/><path d="M620 830H215" stroke="#315b7d"/></g><g fill="#172033" font-size="21"><text x="250" y="285">1  Intent：分析当前 workspace</text><text x="650" y="415">3  受限任务 + capability profile</text><text x="1080" y="535">4  读取文件 / 调用工具</text><text x="1100" y="635">5  结果与退出状态</text><text x="670" y="725">6  token / tool / progress 事件流</text><text x="250" y="815">7  审计、脱敏后的 UI 事件</text></g>
<rect x="470" y="320" width="300" height="80" rx="16" fill="#e7f0f7" stroke="#315b7d" stroke-width="3"/><text x="620" y="352" text-anchor="middle" font-size="19" font-weight="700" fill="#172033">2  Permission Broker</text><text x="620" y="380" text-anchor="middle" font-size="17" fill="#536179">来源 · scope · 审批 · 参数校验</text>
<rect x="560" y="885" width="900" height="55" rx="14" fill="#fff4df"/><text x="1010" y="920" text-anchor="middle" font-size="19" fill="#6e4b18">协议必须覆盖：version · requestId · sequence · cancel · timeout · backpressure</text></g></svg>
