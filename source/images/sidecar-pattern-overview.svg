<svg xmlns="http://www.w3.org/2000/svg" width="1600" height="900" viewBox="0 0 1600 900" role="img" aria-labelledby="title desc">
  <title id="title">Sidecar 边车模式总体结构</title><desc id="desc">React Webview 通过 Tauri Rust Core 访问 Rust Data Service 和 Node Agent Host Sidecar，Core 是可信边界。</desc>
  <rect width="1600" height="900" fill="#f6f8fb"/><text x="100" y="105" font-family="system-ui,sans-serif" font-size="46" font-weight="700" fill="#172033">Sidecar 边车模式</text><text x="100" y="155" font-family="system-ui,sans-serif" font-size="24" fill="#536179">主应用掌舵，异构运行时进入受控执行舱</text>
  <rect x="100" y="240" width="300" height="180" rx="24" fill="#ffffff" stroke="#a9b6c8" stroke-width="3"/><text x="250" y="305" text-anchor="middle" font-family="system-ui,sans-serif" font-size="28" font-weight="700" fill="#172033">React Webview</text><text x="250" y="350" text-anchor="middle" font-family="system-ui,sans-serif" font-size="21" fill="#536179">UI · Intent · Stream View</text><text x="250" y="385" text-anchor="middle" font-family="system-ui,sans-serif" font-size="18" fill="#8a3d35">无本地特权</text>
  <path d="M400 330 H570" stroke="#486d91" stroke-width="5" fill="none"/><polygon points="570,330 550,318 550,342" fill="#486d91"/><text x="485" y="310" text-anchor="middle" font-family="system-ui,sans-serif" font-size="18" fill="#536179">Command / Channel</text>
  <rect x="570" y="205" width="420" height="250" rx="28" fill="#e7f0f7" stroke="#315b7d" stroke-width="5"/><text x="780" y="285" text-anchor="middle" font-family="system-ui,sans-serif" font-size="34" font-weight="700" fill="#172033">Tauri Rust Core</text><text x="780" y="335" text-anchor="middle" font-family="system-ui,sans-serif" font-size="22" fill="#315b7d">Permission Broker · Lifecycle</text><text x="780" y="375" text-anchor="middle" font-family="system-ui,sans-serif" font-size="22" fill="#315b7d">Signing · Audit · IPC Validation</text><rect x="625" y="404" width="310" height="34" rx="17" fill="#315b7d"/><text x="780" y="428" text-anchor="middle" font-family="system-ui,sans-serif" font-size="17" fill="#ffffff">LOCAL TRUST BOUNDARY</text>
  <path d="M990 290 H1160" stroke="#486d91" stroke-width="5" fill="none"/><polygon points="1160,290 1140,278 1140,302" fill="#486d91"/><path d="M1160 370 H990" stroke="#486d91" stroke-width="5" fill="none"/><polygon points="990,370 1010,358 1010,382" fill="#486d91"/><text x="1075" y="335" text-anchor="middle" font-family="system-ui,sans-serif" font-size="18" fill="#536179">Versioned IPC</text>
  <rect x="1160" y="205" width="340" height="250" rx="28" fill="#fff4df" stroke="#a06b18" stroke-width="4"/><text x="1330" y="275" text-anchor="middle" font-family="system-ui,sans-serif" font-size="31" font-weight="700" fill="#172033">Node Agent Host</text><text x="1330" y="315" text-anchor="middle" font-family="system-ui,sans-serif" font-size="23" font-weight="700" fill="#a06b18">SIDECAR</text><text x="1330" y="360" text-anchor="middle" font-family="system-ui,sans-serif" font-size="20" fill="#536179">Codex · Qoder · ACP · MCP</text><text x="1330" y="400" text-anchor="middle" font-family="system-ui,sans-serif" font-size="18" fill="#8a3d35">执行任务，不决定权限</text>
  <path d="M780 455 V590" stroke="#486d91" stroke-width="5"/><polygon points="780,590 768,570 792,570" fill="#486d91"/>
  <rect x="570" y="590" width="420" height="180" rx="24" fill="#ffffff" stroke="#6a8775" stroke-width="4"/><text x="780" y="655" text-anchor="middle" font-family="system-ui,sans-serif" font-size="29" font-weight="700" fill="#172033">Rust Data Service</text><text x="780" y="700" text-anchor="middle" font-family="system-ui,sans-serif" font-size="21" fill="#536179">SQLite · Sync · Search · Transaction</text><text x="780" y="738" text-anchor="middle" font-family="system-ui,sans-serif" font-size="18" fill="#486d55">核心数据不交给 Sidecar</text>
  <rect x="1100" y="570" width="400" height="200" rx="24" fill="#ffffff" stroke="#a9b6c8" stroke-width="3"/><text x="1300" y="635" text-anchor="middle" font-family="system-ui,sans-serif" font-size="29" font-weight="700" fill="#172033">Workspace</text><text x="1300" y="680" text-anchor="middle" font-family="system-ui,sans-serif" font-size="21" fill="#536179">Files · Git · Processes · Network</text><text x="1300" y="720" text-anchor="middle" font-family="system-ui,sans-serif" font-size="18" fill="#8a3d35">按任务 scope 授权</text><path d="M1330 455 V570" stroke="#a06b18" stroke-width="5" stroke-dasharray="12 10"/><polygon points="1330,570 1318,550 1342,550" fill="#a06b18"/>
</svg>
