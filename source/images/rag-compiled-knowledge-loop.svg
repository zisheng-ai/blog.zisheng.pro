<svg xmlns="http://www.w3.org/2000/svg" width="1600" height="920" viewBox="0 0 1600 920" role="img" aria-labelledby="title desc"><title id="title">编译式 RAG 知识构建闭环</title><desc id="desc">原始资料经解析、合并、冲突检测和校验生成可版本化知识产物，查询时读取产物并回查关键原文，失败结果进入重编译。</desc><defs><linearGradient id="bg" x1="0" y1="0" x2="1" y2="1"><stop stop-color="#100b08"/><stop offset="1" stop-color="#18131a"/></linearGradient><pattern id="g" width="40" height="40" patternUnits="userSpaceOnUse"><path d="M40 0H0V40" fill="none" stroke="#d7aa7a" stroke-opacity=".06"/></pattern><marker id="a" viewBox="0 0 10 10" refX="8" refY="5" markerWidth="7" markerHeight="7" orient="auto"><path d="M0 0l10 5-10 5z" fill="#b28a66"/></marker></defs><rect width="1600" height="920" fill="url(#bg)"/><rect width="1600" height="920" fill="url(#g)"/>
<g font-family="-apple-system,BlinkMacSystemFont,'PingFang SC','Microsoft YaHei',sans-serif"><text x="80" y="86" fill="#fff9f4" font-size="48" font-weight="800">编译式 RAG：把重复综合前移到 Build Time</text><text x="80" y="132" fill="#b9a89b" font-size="22">产物不是新的事实源，而是可审阅、可版本化、可删除重建的知识中间表示</text>
<g text-anchor="middle"><rect x="70" y="255" width="290" height="230" rx="28" fill="#211711" stroke="#e49a59"/><text x="215" y="305" fill="#ffc27d" font-size="25" font-weight="750">RAW SOURCES</text><text x="215" y="355" fill="#ead7c6" font-size="19">政策 · 状态定义</text><text x="215" y="392" fill="#ead7c6" font-size="19">SOP · 已审核案例</text><text x="215" y="447" fill="#a99381" font-size="17">不可被编译器改写</text><rect x="490" y="215" width="360" height="310" rx="30" fill="#2a1c12" stroke="#f0a45f"/><text x="670" y="270" fill="#ffd092" font-size="27" font-weight="780">KNOWLEDGE COMPILER</text><text x="670" y="326" fill="#eed9c6" font-size="19">Parse + Schema</text><text x="670" y="365" fill="#eed9c6" font-size="19">Extract + Merge</text><text x="670" y="404" fill="#eed9c6" font-size="19">Conflict Detection</text><text x="670" y="443" fill="#eed9c6" font-size="19">Citation Map + Validation</text><rect x="980" y="255" width="550" height="230" rx="28" fill="#211915" stroke="#d89155"/><text x="1255" y="305" fill="#ffc98d" font-size="25" font-weight="750">BUILD ARTIFACTS</text><g fill="#ead9ca" font-size="19"><text x="1125" y="360">Topic Page</text><text x="1380" y="360">Entity Page</text><text x="1125" y="402">Procedure</text><text x="1380" y="402">Conflict Page</text><text x="1255" y="447">Index · Manifest · Revision</text></g></g>
<path d="M360 370h120M850 370h120" stroke="#b28a66" stroke-width="4" marker-end="url(#a)"/>
<rect x="980" y="650" width="550" height="125" rx="27" fill="#171d25" stroke="#7188a9"/><text x="1255" y="698" fill="#eef4fb" font-size="25" font-weight="750" text-anchor="middle">QUERY TIME</text><text x="1255" y="738" fill="#bdcad8" font-size="19" text-anchor="middle">Search → Read → Follow Links → Critical Claim Source Check</text><path d="M1255 485v155" stroke="#8b8177" stroke-width="4" marker-end="url(#a)"/>
<rect x="70" y="650" width="780" height="125" rx="27" fill="#25161a" stroke="#cc6575"/><text x="460" y="698" fill="#ffb4be" font-size="25" font-weight="750" text-anchor="middle">EVAL / REVIEW</text><text x="460" y="738" fill="#e2c3c7" font-size="19" text-anchor="middle">遗漏事实 · 冲突误判 · 过期页面 → 诊断问题 → 重编译</text><path d="M970 712H860" stroke="#9d7372" stroke-width="4" marker-end="url(#a)"/><path d="M460 650V575H670v-40" fill="none" stroke="#9d7372" stroke-width="4" marker-end="url(#a)"/>
<text x="800" y="865" fill="#8e7b6d" font-size="18" text-anchor="middle">只有同时保留 Source Manifest、Compiler Version、Status 与 Eval，编译产物才适合长期复用</text></g></svg>
