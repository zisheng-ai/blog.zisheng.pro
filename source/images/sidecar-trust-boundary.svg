<svg xmlns="http://www.w3.org/2000/svg" width="1600" height="920" viewBox="0 0 1600 920" role="img" aria-labelledby="title desc"><title id="title">Sidecar 可信边界与防线</title><desc id="desc">Sidecar 是独立进程但不是安全沙箱，Rust Permission Broker 用多层控制限制文件、网络、进程和凭据访问。</desc><rect width="1600" height="920" fill="#f6f8fb"/><text x="90" y="92" font-family="system-ui,sans-serif" font-size="42" font-weight="700" fill="#172033">进程隔离 ≠ 安全沙箱</text><text x="90" y="138" font-family="system-ui,sans-serif" font-size="23" fill="#536179">Sidecar 可以独立崩溃，但仍可能触达宿主机资源</text>
<rect x="90" y="210" width="420" height="570" rx="28" fill="#fff4df" stroke="#a06b18" stroke-width="4"/><text x="300" y="280" text-anchor="middle" font-family="system-ui,sans-serif" font-size="31" font-weight="700" fill="#172033">Node Sidecar</text><text x="300" y="325" text-anchor="middle" font-family="system-ui,sans-serif" font-size="20" fill="#8a3d35">独立进程，不天然受限</text><g font-family="system-ui,sans-serif" font-size="21" fill="#536179"><text x="150" y="410">可能读取任意文件</text><text x="150" y="485">可能继承全部 env</text><text x="150" y="560">可能直接访问网络</text><text x="150" y="635">可能启动任意进程</text><text x="150" y="710">可能绕过用户审批</text></g>
<rect x="610" y="190" width="390" height="610" rx="28" fill="#e7f0f7" stroke="#315b7d" stroke-width="5"/><text x="805" y="260" text-anchor="middle" font-family="system-ui,sans-serif" font-size="31" font-weight="700" fill="#172033">Rust Permission Broker</text><g font-family="system-ui,sans-serif"><g fill="#ffffff" stroke="#91a7ba" stroke-width="2"><rect x="665" y="315" width="280" height="64" rx="14"/><rect x="665" y="405" width="280" height="64" rx="14"/><rect x="665" y="495" width="280" height="64" rx="14"/><rect x="665" y="585" width="280" height="64" rx="14"/><rect x="665" y="675" width="280" height="64" rx="14"/></g><g fill="#172033" font-size="20" text-anchor="middle"><text x="805" y="355">Intent 与参数校验</text><text x="805" y="445">Workspace Scope</text><text x="805" y="535">Command / Network Allowlist</text><text x="805" y="625">用户审批与审计</text><text x="805" y="715">Hash · Signature · Protocol</text></g></g>
<path d="M510 495H610" stroke="#8a3d35" stroke-width="7"/><polygon points="610,495 588,482 588,508" fill="#8a3d35"/><path d="M1000 495H1090" stroke="#315b7d" stroke-width="7"/><polygon points="1090,495 1068,482 1068,508" fill="#315b7d"/>
<rect x="1090" y="210" width="420" height="570" rx="28" fill="#ffffff" stroke="#6a8775" stroke-width="4"/><text x="1300" y="280" text-anchor="middle" font-family="system-ui,sans-serif" font-size="31" font-weight="700" fill="#172033">最小授权资源</text><g font-family="system-ui,sans-serif"><g fill="#eef5ef"><rect x="1150" y="350" width="300" height="66" rx="14"/><rect x="1150" y="445" width="300" height="66" rx="14"/><rect x="1150" y="540" width="300" height="66" rx="14"/><rect x="1150" y="635" width="300" height="66" rx="14"/></g><g fill="#172033" font-size="20" text-anchor="middle"><text x="1300" y="390">当前任务所需文件</text><text x="1300" y="485">批准的工具与参数</text><text x="1300" y="580">短生命周期凭据</text><text x="1300" y="675">脱敏后的事件输出</text></g></g><text x="800" y="870" text-anchor="middle" font-family="system-ui,sans-serif" font-size="23" font-weight="700" fill="#8a3d35">边车负责执行，宿主负责授权；不要让执行者给自己发通行证。</text></svg>
